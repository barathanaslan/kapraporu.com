<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMSA - CIMSA | Kap Raporu</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Header Component -->
    <kap-header></kap-header>

    <div class="container">
        <div class="stock-header">
            <div class="stock-info">
                <div class="stock-meta">
                    <div class="stock-symbol">CIMSA</div>
                    <div class="stock-name">CIMSA</div>
                    <div class="stock-sector">Unknown</div>
                </div>
                <div class="stock-description">Stock KAP data from 08.04.2025</div>
            </div>
            <div class="stock-price-container">
                <div class="current-price">₺0,00</div>
                <div class="price-change price-up"><span>₺0,00</span> <span>(0,00%)</span></div>
                <div class="update-time">08.04.2025 - BIST kapanış (Tahmini)</div>
            </div>
        </div>

        <div class="main-content">
            <div class="news-timeline">
                <h2 class="section-title">Haber Akışı (CIMSA)</h2>

                <div class="timeline-container">
                    <div class="timeline">
                        <!-- News timeline will be loaded by JavaScript -->
                    </div>
                </div>
            </div>

            <div class="investment-plans">
                <!-- Investment plans will be loaded here -->
            </div>

            <div class="stock-sidebar">
                <div class="filter-panel">
                    <h3 class="section-title">Haber Filtreleri</h3>
                    <div class="filter-options">
                        <div class="filter-option active">Tümü</div>
                        <div class="filter-option">Finansal</div>
                        <div class="filter-option">Yatırım</div>
                        <div class="filter-option">Operasyonel</div>
                        <div class="filter-option">Yönetim</div>
                        <div class="filter-option">Diğer</div>
                    </div>
                </div>

                <div class="news-detail">
                    <!-- News detail will be loaded by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Component -->
    <kap-footer></kap-footer>

    <!-- Load components and data -->
    <script src="../components/header.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
